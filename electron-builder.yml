appId: com.oneppt.app
productName: OnePPT
directories:
  buildResources: resources
files:
  - '**/*'
  - resources/styles/**
  - resources/google-fonts/**
  - resources/anime.v4.js
  - resources/chart.v4.js
  - resources/tailwindcss.v3.js
  - resources/index-runtime.js
  - resources/ppt-runtime.js
  - resources/slide-pack-windows-amd64.exe
  - resources/slide-pack-darwin-amd64
  - resources/slide-pack-darwin-arm64
  - resources/katex/**
  - resources/icons/**
  - resources/skills/**
  - '!**/.DS_Store'
  - '!**/._*'
  # ffmpeg is copied by scripts/after-pack.cjs per platform so unused binaries are not bundled.
  # Linux currently has no bundled ffmpeg binary in resources/ffmpeg; MP4 export needs a Linux
  # ffmpeg asset before Linux video export can be enabled in packaged apps.
  - '!resources/ffmpeg/**'
  - '!**/.vscode/*'
  - '!**/.idea/**'
  - '!**/.git/**'
  - '!src/**'
  - '!tools/**'

  - '!assets/**'
  - '!docs/**'
  - '!doc/**'
  - '!logs/**'
  - '!patch/**'
  - '!tpack/**'
  - '!dist/**'
  - '!.claude/**'
  - '!.pnpm-store/**'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!README_*'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!**/*.map'
  - '!**/*.tsbuildinfo'
  - '!*.db'
  - '!*.db-*'
  - '!{oneppt.dev.db,oneppt.db}'
  - '!thumb.png'
  - '!tests/**'
  - '!test/**'
asarUnpack:
  - resources/**
  - '**/*.node'
afterPack: scripts/after-pack.cjs
extraResources:
  - from: resources/icons/icon.ico
    to: icons/icon.ico
  - from: resources/icons/32x32.png
    to: icons/32x32.png
  - from: resources/icons/16x16.png
    to: icons/16x16.png
forceCodeSigning: false
win:
  target:
    - target: nsis
      arch:
        - x64
  executableName: oneppt
  icon: resources/icons/icon.ico
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
  installerIcon: resources/icons/icon.ico
  uninstallerIcon: resources/icons/icon.ico
  installerHeaderIcon: resources/icons/icon.ico
  unicode: true
  warningsAsErrors: false
  runAfterFinish: false
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createStartMenuShortcut: true
  include: installer.nsh
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icons/icon.icns
  identity: null
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}-${arch}.${ext}
linux:
  # Packaging metadata is ready for Linux, but resources/ffmpeg currently only contains
  # macOS and Windows binaries. scripts/after-pack.cjs already looks for ffmpeg-linux-x64;
  # add that binary before advertising MP4 export support for Linux packages.
  executableName: oneppt
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: resources/icons
  maintainer: arcsin1
  vendor: arcsin1
  category: Office
  synopsis: Local-first AI presentation workbench
  description: OnePPT is a local-first AI presentation generator and editor.
appImage:
  artifactName: ${name}-${version}-${arch}.${ext}
deb:
  artifactName: ${name}-${version}-${arch}.${ext}
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
npmRebuild: true
publish:
  provider: generic
  url: https://example.com/auto-updates

