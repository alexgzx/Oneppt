<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>日落暖 / Sunset Warm</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
html{display:grid;place-items:center;background:#0f1117}
body{display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;background:#0f1117}
.slide{position:relative;width:min(100vw,calc(100vh*16/9));aspect-ratio:16/9;overflow:hidden;background:linear-gradient(180deg,#7c2d12 0%,#9a3412 16%,#f97316 44%,#fbbf24 70%,#fed7aa 100%);border-radius:6px;box-shadow:0 0 0 1px rgba(255,255,255,.08);display:flex;flex-direction:column;justify-content:flex-end;padding:clamp(16px,4vw,48px) clamp(20px,5.5vw,64px)}
.sun{position:absolute;top:12%;right:10%;width:clamp(56px,12vw,150px);height:clamp(56px,12vw,150px);background:radial-gradient(circle,#fbbf24 0%,#f97316 50%,rgba(249,115,22,0) 100%);border-radius:50%}
.halo{position:absolute;top:calc(12% - clamp(12px,2.5vw,30px));right:calc(10% - clamp(12px,2.5vw,30px));width:clamp(80px,17vw,210px);height:clamp(80px,17vw,210px);border:2px solid rgba(251,191,36,.18);border-radius:50%}
.cloud{position:absolute;background:rgba(254,215,170,.13);border-radius:clamp(14px,3vw,40px)}
.c1{top:18%;left:8%;width:clamp(56px,12vw,140px);height:clamp(14px,3vw,34px)}
.c2{top:34%;left:28%;width:clamp(36px,8vw,96px);height:clamp(10px,2.2vw,24px)}
.c3{top:12%;left:50%;width:clamp(44px,10vw,120px);height:clamp(12px,2.5vw,28px)}
.content{position:relative;z-index:1}
.tag{font-family:"SFMono-Regular",Consolas,monospace;font-size:clamp(7px,.95vw,10px);color:rgba(255,255,255,.65);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:clamp(4px,.8vw,10px)}
.title{font-family:Georgia,"Songti SC",serif;font-size:clamp(28px,5.5vw,66px);color:#fff;font-weight:bold;line-height:1.15;margin-bottom:clamp(4px,.8vw,10px);text-shadow:0 2px 10px rgba(124,45,18,.28)}
.desc{font-size:clamp(10px,1.4vw,16px);color:rgba(255,255,255,.85);line-height:1.6;max-width:clamp(160px,34vw,420px)}
.palette{display:flex;gap:clamp(4px,.6vw,7px);margin-top:clamp(8px,1.5vw,18px)}
.sw{width:clamp(12px,1.8vw,20px);height:clamp(12px,1.8vw,20px);border-radius:50%;background:var(--c);border:1px solid rgba(255,255,255,.18)}
</style>
</head>
<body>
<div class="slide">
  <div class="sun"></div>
  <div class="halo"></div>
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="content">
    <div class="tag">Sunset Warm</div>
    <div class="title">日落暖</div>
    <div class="desc">橘色珊瑚琥珀三色铺满天际，温度本身就是叙事</div>
    <div class="palette">
      <i class="sw" style="--c:#7c2d12"></i>
      <i class="sw" style="--c:#9a3412"></i>
      <i class="sw" style="--c:#f97316"></i>
      <i class="sw" style="--c:#fbbf24"></i>
      <i class="sw" style="--c:#fed7aa"></i>
    </div>
  </div>
</div>
</body>
</html>
