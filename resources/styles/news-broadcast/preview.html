<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>新闻播报 · News Broadcast</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1117}
body{display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.slide{position:relative;width:min(100vw,calc(100vh*16/9));aspect-ratio:16/9;overflow:hidden;background:#ffffff;box-shadow:0 0 0 1px rgba(255,255,255,.08)}
.red-bar{position:absolute;left:0;top:0;width:clamp(24px,3.5vw,48px);height:100%;background:#dc2626;z-index:2}
.red-bar::after{content:'';position:absolute;right:0;top:0;width:4px;height:100%;background:#991b1d}
.live-badge{position:absolute;left:clamp(32px,4.6vw,66px);top:clamp(12px,2vw,26px);z-index:3;display:flex;align-items:center;gap:clamp(6px,.8vw,12px)}
.live-dot{width:clamp(8px,1vw,14px);height:clamp(8px,1vw,14px);border-radius:50%;background:#dc2626;box-shadow:0 0 0 2px #fff,0 0 8px rgba(220,38,38,.5)}
.live-text{font-size:clamp(8px,1vw,14px);font-weight:900;letter-spacing:.15em;text-transform:uppercase;color:#dc2626}
.channel{position:absolute;right:clamp(14px,2.5vw,36px);top:clamp(12px,2vw,26px);z-index:3;font-size:clamp(8px,1vw,13px);font-weight:800;letter-spacing:.12em;color:#7f1d1d;text-transform:uppercase}
.channel span{color:#dc2626}
.content{position:absolute;left:clamp(32px,4.6vw,66px);top:0;right:0;bottom:clamp(26px,3.6vw,48px);z-index:2;display:flex;flex-direction:column;justify-content:center;padding:clamp(14px,2.5vw,34px) clamp(14px,2.5vw,34px) clamp(14px,2.5vw,34px) 0}
.eyebrow{font-size:clamp(7px,.85vw,11px);font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:#991b1b;margin-bottom:clamp(4px,.6vw,8px)}
h1{font-size:clamp(22px,4.4vw,52px);line-height:1;font-weight:900;color:#7f1d1d;letter-spacing:-.02em}
h1 em{font-style:normal;color:#dc2626}
.desc{font-size:clamp(9px,1.2vw,15px);line-height:1.6;color:#333;margin-top:clamp(6px,1vw,14px);max-width:75%}
.info-row{display:flex;gap:clamp(8px,1.2vw,18px);margin-top:clamp(10px,1.6vw,22px);align-items:center;flex-wrap:wrap}
.info-chip{font-size:clamp(7px,.8vw,10px);font-weight:700;padding:clamp(3px,.4vw,6px) clamp(6px,.8vw,12px);border-left:4px solid #dc2626;background:#fef2f2;color:#7f1d1d}
.stats{display:flex;gap:clamp(12px,2.4vw,32px);margin-top:clamp(10px,1.6vw,22px)}
.stat-num{font-size:clamp(18px,3.2vw,38px);font-weight:900;color:#dc2626;line-height:1}
.stat-label{font-size:clamp(6px,.7vw,9px);color:#666;margin-top:clamp(2px,.3vw,4px)}
.palette{display:flex;gap:clamp(3px,.4vw,5px);margin-left:auto;align-items:center}
.sw{width:clamp(9px,1.2vw,14px);height:clamp(9px,1.2vw,14px);background:var(--c);border:1px solid rgba(127,29,29,.2)}
.ticker{position:absolute;left:0;bottom:0;right:0;height:clamp(24px,3.4vw,46px);background:#dc2626;z-index:3;display:flex;align-items:center;padding:0 clamp(10px,1.5vw,22px);gap:clamp(8px,1.2vw,18px);overflow:hidden}
.ticker-label{font-size:clamp(7px,.85vw,11px);font-weight:900;letter-spacing:.12em;text-transform:uppercase;color:#fff;background:#7f1d1d;padding:clamp(2px,.3vw,5px) clamp(6px,.8vw,12px);white-space:nowrap}
.ticker-text{font-size:clamp(7px,.8vw,10px);font-weight:700;color:#fff;letter-spacing:.04em;white-space:nowrap;opacity:.9}
.ticker-sep{width:clamp(2px,.2vw,3px);height:clamp(10px,1.4vw,18px);background:rgba(255,255,255,.35)}
.ticker-right{margin-left:auto;font-size:clamp(6px,.7vw,9px);font-weight:800;color:rgba(255,255,255,.7);letter-spacing:.1em;text-transform:uppercase}
</style>
</head>
<body>
<div class="slide">
  <div class="red-bar"></div>
  <div class="live-badge">
    <div class="live-dot"></div>
    <div class="live-text">Live</div>
  </div>
  <div class="channel">CCTV · <span>财经频道</span></div>
  <div class="content">
    <div class="eyebrow">Breaking News · 独家</div>
    <h1>三季度GDP<br>增长<em>4.9%</em></h1>
    <p class="desc">国家统计局今日发布数据，前三季度国内生产总值同比增长5.2%。高技术制造业增加值同比增长8.2%，新动能持续集聚，消费市场回暖明显。</p>
    <div class="stats">
      <div><div class="stat-num">¥91.3万亿</div><div class="stat-label">前三季度GDP</div></div>
      <div><div class="stat-num">+4.9%</div><div class="stat-label">三季度增速</div></div>
      <div><div class="stat-num">+6.8%</div><div class="stat-label">社零增长</div></div>
    </div>
    <div class="info-row">
      <div class="info-chip">宏观经济</div>
      <div class="info-chip">产业数据</div>
      <div class="info-chip">政策解读</div>
      <div class="palette">
        <i class="sw" style="--c:#7f1d1d"></i>
        <i class="sw" style="--c:#991b1b"></i>
        <i class="sw" style="--c:#dc2626"></i>
        <i class="sw" style="--c:#b91c1c"></i>
        <i class="sw" style="--c:#ffffff"></i>
      </div>
    </div>
  </div>
  <div class="ticker">
    <span class="ticker-label">Breaking</span>
    <span class="ticker-text">沪指收复3200点 成交额突破1.2万亿</span>
    <span class="ticker-sep"></span>
    <span class="ticker-text">人民币汇率回升至7.15</span>
    <span class="ticker-sep"></span>
    <span class="ticker-text">新能源汽车出口同比增长120%</span>
    <span class="ticker-right">13:00 · STUDIO B</span>
  </div>
</div>
</body>
</html>
