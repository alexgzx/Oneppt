<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>扁豆紫蜜陀僧 · 国风治愈</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1600px; height: 900px; overflow: hidden; }
  body { font-family: "Songti SC", "STSong", serif; }
  .stage {
    width: 1600px; height: 900px; position: relative; overflow: hidden;
    background: linear-gradient(180deg, #9E7059 0%, #B8835A 30%, #D88E50 55%, #EC954E 80%, #F0A968 100%);
  }
  /* sun glow */
  .sun {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -38%);
    width: 280px; height: 280px; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,235,200,0.9) 0%, rgba(244,180,120,0.5) 40%, transparent 70%);
    filter: blur(2px);
  }
  /* clouds */
  .cloud {
    position: absolute;
    background: radial-gradient(ellipse at center, rgba(255,240,220,0.45) 0%, rgba(255,240,220,0.1) 55%, transparent 75%);
    border-radius: 50%; filter: blur(8px);
  }
  .c1 { width: 600px; height: 200px; top: 80px; left: 80px; }
  .c2 { width: 460px; height: 160px; top: 180px; right: 100px; opacity: 0.65; }
  .c3 { width: 540px; height: 180px; top: 320px; left: 480px; opacity: 0.45; }
  /* sparkles */
  .sp {
    position: absolute; width: 5px; height: 5px;
    background: #F4D9B0; border-radius: 50%;
    box-shadow: 0 0 10px rgba(244,217,176,0.9);
  }
  .p1{top:120px;left:300px}.p2{top:200px;left:900px}
  .p3{top:80px;left:1200px}.p4{top:260px;left:500px;opacity:.7}
  .p5{top:340px;left:1300px;opacity:.6}.p6{top:160px;left:700px;opacity:.8}
  /* water reflection */
  .water {
    position: absolute; bottom: 0; left: 0; width: 1600px; height: 200px;
    background: linear-gradient(180deg, rgba(240,169,104,0.3) 0%, rgba(236,149,78,0.6) 100%);
  }
  .wave {
    position: absolute; height: 1px; background: rgba(255,240,220,0.4);
    border-radius: 50%;
  }
  .w1 { width: 600px; bottom: 50px; left: 150px; }
  .w2 { width: 800px; bottom: 90px; left: 600px; opacity: 0.5; }
  .w3 { width: 400px; bottom: 130px; left: 1100px; opacity: 0.4; }
  /* content */
  .content {
    position: absolute; top: 130px; left: 50%; transform: translateX(-50%);
    text-align: center; z-index: 5; color: #FBF3E8;
  }
  .kicker {
    font-size: 17px; letter-spacing: 14px; font-weight: 300;
    opacity: 0.85; margin-bottom: 28px;
    font-family: "PingFang SC", sans-serif;
  }
  .kicker::before, .kicker::after { content: "·"; margin: 0 18px; opacity: 0.6; }
  h1 {
    font-size: 120px; font-weight: 600; letter-spacing: 24px;
    text-shadow: 0 4px 30px rgba(120,60,30,0.35);
    margin-bottom: 14px;
  }
  .h-sub {
    font-size: 48px; font-weight: 300; letter-spacing: 20px;
    opacity: 0.92; margin-bottom: 40px;
  }
  .verse {
    font-size: 22px; font-weight: 300; line-height: 2;
    max-width: 760px; margin: 0 auto;
    opacity: 0.9; letter-spacing: 3px;
  }
  /* bottom card */
  .seal {
    position: absolute; bottom: 70px; right: 90px; z-index: 5;
    width: 110px; height: 110px;
    background: rgba(120,60,30,0.85);
    border-radius: 6px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: #FBF3E8;
    transform: rotate(-3deg);
    box-shadow: 0 8px 30px rgba(120,60,30,0.4);
  }
  .seal .ch { font-size: 38px; font-weight: 700; letter-spacing: 4px; line-height: 1.1; }
  .seal .en { font-size: 10px; letter-spacing: 3px; margin-top: 8px; opacity: 0.8; font-family: "PingFang SC", sans-serif; }
  .meta-bar {
    position: absolute; bottom: 90px; left: 90px; z-index: 5;
    color: #FBF3E8; font-family: "PingFang SC", sans-serif;
  }
  .meta-bar .t { font-size: 16px; letter-spacing: 4px; opacity: 0.75; margin-bottom: 10px; }
  .meta-bar .v { font-size: 22px; font-weight: 500; letter-spacing: 2px; }
  .meta-bar .d { font-size: 13px; opacity: 0.7; margin-top: 6px; letter-spacing: 1px; }
</style>
</head>
<body>
<div class="stage">
  <div class="cloud c1"></div>
  <div class="cloud c2"></div>
  <div class="cloud c3"></div>
  <div class="sun"></div>
  <div class="sp p1"></div><div class="sp p2"></div>
  <div class="sp p3"></div><div class="sp p4"></div>
  <div class="sp p5"></div><div class="sp p6"></div>

  <div class="water">
    <div class="wave w1"></div><div class="wave w2"></div><div class="wave w3"></div>
  </div>

  <div class="content">
    <div class="kicker">东方色集</div>
    <h1>扁豆紫 · 蜜陀僧</h1>
    <div class="h-sub">黄昏入梦</div>
    <p class="verse">紫是云将散未散的余温，橙是日未落先燃的焰。<br>一色一名，一物一境。</p>
  </div>

  <div class="meta-bar">
    <div class="t">第 七 期 · 处暑</div>
    <div class="v">古色新读 · 治愈共读</div>
    <div class="d">2026 · 秋分专场 · 9.22</div>
  </div>

  <div class="seal">
    <div class="ch">治愈</div>
    <div class="en">HEALING</div>
  </div>
</div>
</body>
</html>
