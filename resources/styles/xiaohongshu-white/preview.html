<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小红书白 · Xiaohongshu White</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0f1117}
body{display:grid;place-items:center;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
.slide{position:relative;width:min(100vw,calc(100vh*16/9));aspect-ratio:16/9;overflow:hidden;background:linear-gradient(160deg,#ffffff 0%,#fff8f6 100%);box-shadow:0 0 0 1px rgba(255,255,255,.06)}
.layout{position:absolute;inset:0;display:grid;grid-template-columns:42% 58%}
.left{position:relative;padding:clamp(20px,4vw,52px) clamp(12px,2.5vw,32px) clamp(16px,3vw,40px) clamp(20px,4vw,52px);display:flex;flex-direction:column;justify-content:center}
.tag-row{display:flex;align-items:center;gap:clamp(5px,1vw,10px);margin-bottom:clamp(8px,1.6vw,20px)}
.tag-red{font-size:clamp(7px,.8vw,10px);color:#fff;background:#f56565;padding:clamp(2px,.3vw,4px) clamp(6px,1vw,12px);border-radius:clamp(4px,.6vw,8px);font-weight:600}
.tag-date{font-size:clamp(6px,.7vw,9px);color:#a8a29e}
h1{font-family:Georgia,"Songti SC","Noto Serif SC",serif;font-size:clamp(20px,3.6vw,44px);color:#7c2d12;font-weight:700;line-height:1.25}
h1 em{font-style:normal;color:#f56565}
.lead{font-family:Georgia,"Songti SC",serif;font-size:clamp(9px,1.1vw,14px);color:#78716c;line-height:1.8;margin-top:clamp(8px,1.5vw,18px)}
.highlight{background:linear-gradient(180deg,transparent 60%,rgba(245,101,101,.15) 60%);padding:0 2px}
.stats{display:flex;gap:clamp(10px,2vw,28px);margin-top:clamp(10px,2vw,26px)}
.stat{text-align:left}
.stat-num{font-family:Georgia,serif;font-size:clamp(16px,2.6vw,32px);color:#f56565;font-weight:bold;line-height:1}
.stat-label{font-size:clamp(6px,.7vw,9px);color:#a8a29e;margin-top:clamp(2px,.3vw,4px)}
.palette{display:flex;gap:clamp(3px,.4vw,5px);margin-top:auto;padding-top:clamp(12px,2vw,28px)}
.sw{width:clamp(9px,1.2vw,14px);height:clamp(9px,1.2vw,14px);border-radius:3px;background:var(--c);border:1px solid rgba(0,0,0,.06)}
.right{position:relative;display:flex;flex-direction:column;gap:clamp(8px,1.4vw,18px);padding:clamp(20px,4vw,52px) clamp(20px,4vw,52px) clamp(16px,3vw,40px) 0;justify-content:center}
.card{background:#fffaf9;border:1px solid #fde2e1;border-radius:clamp(10px,1.6vw,20px);padding:clamp(10px,2vw,26px) clamp(12px,2.4vw,32px);position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:clamp(3px,.4vw,5px);height:100%;background:linear-gradient(180deg,#f56565,#fca5a5)}
.card-title{font-family:Georgia,"Songti SC",serif;font-size:clamp(10px,1.4vw,17px);color:#7c2d12;font-weight:700;padding-left:clamp(6px,1vw,14px)}
.card-list{margin-top:clamp(6px,1vw,14px);padding-left:clamp(6px,1vw,14px);display:flex;flex-direction:column;gap:clamp(3px,.5vw,7px)}
.card-item{display:flex;align-items:flex-start;gap:clamp(4px,.6vw,8px);font-size:clamp(7px,.9vw,11px);color:#78716c;line-height:1.6}
.card-item::before{content:'';display:block;width:clamp(4px,.5vw,6px);height:clamp(4px,.5vw,6px);border-radius:50%;background:#fc8181;margin-top:clamp(3px,.4vw,5px);flex-shrink:0}
.card-warm{background:#fffbeb;border-color:#fde68a}
.card-warm::before{background:linear-gradient(180deg,#92400e,#fbbf24)}
.card-warm .card-item::before{background:#fbbf24}
.footer-tags{display:flex;gap:clamp(4px,.6vw,8px);flex-wrap:wrap;padding-left:0}
.hash{font-size:clamp(7px,.8vw,10px);color:#f56565;font-weight:500}
.bookmark{position:absolute;top:0;right:clamp(12px,2.5vw,32px);width:clamp(18px,2.5vw,32px);height:clamp(28px,3.8vw,50px);background:#f56565;clip-path:polygon(0 0,100% 0,100% 100%,50% 72%,0 100%);z-index:5}
.heart-row{display:flex;align-items:center;gap:clamp(4px,.6vw,8px);margin-top:clamp(8px,1.4vw,18px);padding-left:clamp(6px,1vw,14px)}
.heart{width:clamp(10px,1.4vw,18px);height:clamp(10px,1.4vw,18px);position:relative}
.heart::before,.heart::after{content:'';position:absolute;width:50%;height:80%;background:#f56565;border-radius:50% 50% 0 0}
.heart::before{left:0;transform:rotate(-45deg);transform-origin:0 100%}
.heart::after{right:0;transform:rotate(45deg);transform-origin:100% 100%}
.heart-count{font-size:clamp(8px,1vw,12px);color:#78716c}
</style>
</head>
<body>
<div class="slide">
  <div class="bookmark"></div>
  <div class="layout">
    <div class="left">
      <div class="tag-row">
        <span class="tag-red">秋季限定</span>
        <span class="tag-date">2026.11 · 第 03 期</span>
      </div>
      <h1>京都深秋<br><em>慢游指南</em></h1>
      <p class="lead">十一月的枫叶把整座城染成暖红色。从<span class="highlight">永观堂</span>的逆光枫影到哲学之道的落叶小径，这趟三天两夜的慢节奏旅行，值得你在收藏夹里留一个位置。</p>
      <div class="stats">
        <div class="stat"><div class="stat-num">3天2夜</div><div class="stat-label">行程天数</div></div>
        <div class="stat"><div class="stat-num">12</div><div class="stat-label">必去景点</div></div>
        <div class="stat"><div class="stat-num">4.9</div><div class="stat-label">推荐指数</div></div>
      </div>
      <div class="palette">
        <i class="sw" style="--c:#7c2d12"></i>
        <i class="sw" style="--c:#92400e"></i>
        <i class="sw" style="--c:#f56565"></i>
        <i class="sw" style="--c:#fc8181"></i>
        <i class="sw" style="--c:#fbbf24"></i>
        <i class="sw" style="--c:#fffaf9"></i>
      </div>
    </div>
    <div class="right">
      <div class="card">
        <div class="card-title">必打卡枫叶名所</div>
        <div class="card-list">
          <div class="card-item">永观堂 — 逆光时段 16:00-17:30 最美</div>
          <div class="card-item">东福寺通天桥 — 两旁两百棵枫树隧道</div>
          <div class="card-item">清水寺 — 夜间特别拜观，灯光映枫</div>
        </div>
        <div class="heart-row">
          <div class="heart"></div>
          <span class="heart-count">2.3w 收藏</span>
        </div>
      </div>
      <div class="card card-warm">
        <div class="card-title">温暖美食推荐</div>
        <div class="card-list">
          <div class="card-item">% Arabica 岚山店 — 枫叶窗景拿铁</div>
          <div class="card-item">伊右卫门沙龙 — 抹茶季节限定套餐</div>
        </div>
        <div class="footer-tags" style="margin-top:clamp(8px,1.4vw,18px)">
          <span class="hash">#京都旅行</span>
          <span class="hash">#红叶季</span>
          <span class="hash">#慢生活</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
