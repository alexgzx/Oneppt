name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and package Windows x64
        run: pnpm run build:win

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: release/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and package macOS ARM64
        run: pnpm run build:mac

      - name: 🔥 macOS E2E HTTP smoke test
        run: |
          set +e
          APP_NAME="OnePPT"
          APP_BIN="dist/mac/$APP_NAME.app/Contents/MacOS/$APP_NAME"
          PORT=20128
          LOG="$RUNNER_TEMP/server.log"
          mkdir -p "$RUNNER_TEMP/verify"

          echo "▶️ 后台启动 $APP_BIN ..."
          script -q /dev/null "$APP_BIN" > "$LOG" 2>&1 &
          PID=$!
          echo "启动 PID=$PID"

          echo "⏳ 轮询端口 $PORT（最多 120s）..."
          UP=0
          for i in $(seq 1 120); do
            if curl -fsS "http://127.0.0.1:$PORT/" -o /dev/null 2>/dev/null; then
              echo "✅ Server up after ${i}s"
              UP=1
              break
            fi
            if ! kill -0 $PID 2>/dev/null; then
              echo "❌ Launcher 进程提前退出"
              break
            fi
            sleep 1
          done

          if [ "$UP" != "1" ]; then
            echo "❌ HTTP 端点超时未就绪"
            echo "---- 服务日志（后 200 行）----"
            tail -200 "$LOG" || true
            cp "$LOG" "$RUNNER_TEMP/verify/server.log" 2>/dev/null || true
            screencapture -x -t png "$RUNNER_TEMP/verify/00-failed.png" 2>/dev/null || true
            kill $PID 2>/dev/null
            pkill -f "$APP_NAME.app" 2>/dev/null || true
            exit 1
          fi

          echo "🔎 校验关键路由"
          set -e
          curl -fsS -o "$RUNNER_TEMP/verify/home.html" -w "GET / → HTTP %{http_code}  (%{size_download} bytes)\n" "http://127.0.0.1:$PORT/"

          echo "🧹 优雅退出"
          kill $PID 2>/dev/null
          for i in 1 2 3 4 5; do
            kill -0 $PID 2>/dev/null || break
            sleep 1
          done
          kill -9 $PID 2>/dev/null || true
          pkill -f "$APP_NAME.app" 2>/dev/null || true

          echo "✅ E2E smoke test 通过"

      - name: 📸 Upload macOS verification artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: macos-verification
          path: ${{ runner.temp }}/verify/**
          if-no-files-found: warn
          retention-days: 14

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: release/*.dmg

  publish-release:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release/

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
