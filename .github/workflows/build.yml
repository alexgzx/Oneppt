name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create ffmpeg directory
        run: New-Item -ItemType Directory -Path "resources/ffmpeg" -Force

      - name: Download ffmpeg for Windows
        run: |
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile "resources/ffmpeg/ffmpeg-windows.zip" -UseBasicParsing
          Expand-Archive -Path "resources/ffmpeg/ffmpeg-windows.zip" -DestinationPath "resources/ffmpeg/windows-temp" -Force
          $ffmpegExe = Get-ChildItem -Path "resources/ffmpeg/windows-temp" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1
          Copy-Item -Path $ffmpegExe.FullName -Destination "resources/ffmpeg/ffmpeg.exe" -Force
          Remove-Item -Path "resources/ffmpeg/windows-temp" -Recurse -Force
          Remove-Item -Path "resources/ffmpeg/ffmpeg-windows.zip" -Force
          Write-Host "Windows ffmpeg downloaded successfully"

      - name: Build and package Windows x64
        run: pnpm run build:win

      - name: Verify native modules are unpacked
        run: |
          $nodeFiles = Get-ChildItem -Path "dist/win-unpacked/resources/app.asar.unpacked/node_modules" -Recurse -Filter "*.node" -ErrorAction SilentlyContinue
          if (-not $nodeFiles) {
            Write-Error "ERROR: No .node files found in app.asar.unpacked/node_modules - native modules may not be properly unpacked!"
            exit 1
          }
          Write-Host "SUCCESS: Found $($nodeFiles.Count) native modules in app.asar.unpacked:"
          $nodeFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Create ffmpeg directory
        run: mkdir -p resources/ffmpeg

      - name: Download ffmpeg for macOS
        run: |
          curl -L -o resources/ffmpeg/ffmpeg-macos.zip "https://evermeet.cx/ffmpeg/get/zip"
          unzip -o resources/ffmpeg/ffmpeg-macos.zip -d resources/ffmpeg/macos-intel-temp
          cp resources/ffmpeg/macos-intel-temp/ffmpeg resources/ffmpeg/ffmpeg-intel
          rm -rf resources/ffmpeg/macos-intel-temp resources/ffmpeg/ffmpeg-macos.zip
          
          curl -L -o resources/ffmpeg/ffmpeg-arm.zip "https://ffmpeg.martin-riedl.de/download/macos/arm64/1779038698_N-124530-gf435ce22e1/ffmpeg.zip"
          unzip -o resources/ffmpeg/ffmpeg-arm.zip -d resources/ffmpeg/macos-arm-temp
          cp resources/ffmpeg/macos-arm-temp/ffmpeg resources/ffmpeg/ffmpeg-arm
          rm -rf resources/ffmpeg/macos-arm-temp resources/ffmpeg/ffmpeg-arm.zip
          
          echo "macOS ffmpeg downloaded successfully"

      - name: Build and package macOS ARM64
        run: pnpm run build:mac

      - name: Verify native modules are unpacked
        run: |
          found=false
          for arch in arm64 x64; do
            appPath="dist/mac-${arch}/OnePPT.app/Contents/Resources/app.asar.unpacked/node_modules"
            if [ -d "$appPath" ]; then
              nodeFiles=$(find "$appPath" -name "*.node" 2>/dev/null)
              if [ -n "$nodeFiles" ]; then
                echo "SUCCESS: Found native modules in ${arch}:"
                echo "$nodeFiles"
                found=true
              fi
            fi
          done
          if [ "$found" = false ]; then
            echo "ERROR: No .node files found in any app.asar.unpacked/node_modules - checking available directories..."
            ls -la dist/ 2>/dev/null || echo "dist/ directory doesn't exist"
            find dist -name "*.app" -type d 2>/dev/null || echo "No .app files found"
            exit 1
          fi

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.dmg

  publish-release:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release/

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
