name: Build and Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and package Windows x64
        run: pnpm run build:win

      - name: Verify native modules are unpacked
        run: |
          $nodeFiles = Get-ChildItem -Path "dist/win-unpacked/resources/app.asar.unpacked/node_modules" -Recurse -Filter "*.node" -ErrorAction SilentlyContinue
          if (-not $nodeFiles) {
            Write-Error "ERROR: No .node files found in app.asar.unpacked/node_modules - native modules may not be properly unpacked!"
            exit 1
          }
          Write-Host "SUCCESS: Found $($nodeFiles.Count) native modules in app.asar.unpacked:"
          $nodeFiles | ForEach-Object { Write-Host "  - $($_.FullName)" }

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64
          path: dist/*.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build and package macOS ARM64
        run: pnpm run build:mac

      - name: Verify native modules are unpacked
        run: |
          nodeFiles=$(find "dist/mac-universal/OnePPT.app/Contents/Resources/app.asar.unpacked/node_modules" -name "*.node" 2>/dev/null)
          if [ -z "$nodeFiles" ]; then
            echo "ERROR: No .node files found in app.asar.unpacked/node_modules - native modules may not be properly unpacked!"
            exit 1
          fi
          echo "SUCCESS: Found native modules in app.asar.unpacked:"
          echo "$nodeFiles"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/*.dmg

  publish-release:
    if: github.event_name == 'release' && github.event.action == 'created'
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-x64
          path: release/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-arm64
          path: release/

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
